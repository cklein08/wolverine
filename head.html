<style id="forge-boost-critical">
body:has(#save-when-you-shop-online),body.xwalk-boost-page{background:#0A1A0F;color:#FFFFFF}
main:has(#save-when-you-shop-online),main.xwalk-boost-main{background:#0A1A0F;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;max-width:1280px;margin:0 auto;padding:0 32px 40px;box-sizing:border-box}
main:has(#save-when-you-shop-online)>div:first-child,main:has(#save-when-you-shop-online)>div:nth-child(2),main:has(#save-when-you-shop-online)>div:last-child,main.xwalk-boost-main>div:first-child,main.xwalk-boost-main>div:nth-child(2),main.xwalk-boost-main>div:last-child{grid-column:1/-1}
.xwalk-retail-hero,main:has(#save-when-you-shop-online)>div:nth-child(2){text-align:center;padding:36px 16px 20px}
#save-when-you-shop-online{color:#FFFFFF;font-size:clamp(1.75rem,4vw,2.5rem);font-weight:900;margin:0 0 10px;font-style:normal}
.xwalk-retail-hero-sub,.xwalk-retail-hero-kicker{color:color-mix(in srgb,#FFFFFF 88%,transparent)}
a.xwalk-retail-cta-primary{background:#1DB954;color:#000!important;padding:12px 24px;font-weight:700;text-decoration:none;border-radius:2px;display:inline-block;margin:4px}
main:has(#save-when-you-shop-online)>div:nth-child(3),main:has(#save-when-you-shop-online)>div:nth-child(4),main:has(#save-when-you-shop-online)>div:nth-child(5),main:has(#save-when-you-shop-online)>div:nth-child(6){background:#fff;border:1px solid #d9d9d9;box-shadow:0 2px 10px rgb(0 0 0/35%);color:#000;text-align:center;overflow:hidden;display:flex;flex-direction:column}
main:has(#save-when-you-shop-online)>div:nth-child(3)>p:first-child,main:has(#save-when-you-shop-online)>div:nth-child(4)>p:first-child,main:has(#save-when-you-shop-online)>div:nth-child(5)>p:first-child,main:has(#save-when-you-shop-online)>div:nth-child(6)>p:first-child{background:#1DB954;color:#fff;font-weight:700;padding:12px 10px;margin:0}
main:has(#save-up-to-2400-a-year)>div:last-child,main.xwalk-boost-main>div:last-child{background:#1DB954!important;color:#fff;display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:20px;padding:32px}
main>div.xwalk-hero-section,main>div:has(>h1):not(:has(h3)):not(:has(#save-when-you-shop-online)){position:relative;min-height:320px;overflow:hidden;background:#0A1A0F;padding:48px 24px;text-align:center;grid-column:1/-1}
main>div.xwalk-hero-section>p:has(picture),main>div:has(>h1):not(:has(h3))>p:has(picture){position:absolute;inset:0;margin:0;padding:0}
main>div.xwalk-hero-section>p:has(picture) img,main>div:has(>h1):not(:has(h3))>p:has(picture) img{width:100%;height:100%;object-fit:cover}
main>div.xwalk-hero-section>h1,main>div.xwalk-hero-section>p:not(:has(picture)),main>div:has(>h1):not(:has(h3))>h1,main>div:has(>h1):not(:has(h3))>p:not(:has(picture)){position:relative;z-index:1;color:#FFFFFF}
@media (max-width:1100px){main:has(#save-when-you-shop-online),main.xwalk-boost-main{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media (max-width:600px){main:has(#save-when-you-shop-online),main.xwalk-boost-main{grid-template-columns:1fr;padding:0 16px 32px}}
</style>
