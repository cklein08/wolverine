footer {
  background: #1A2F1E;
  border-top: 1px solid color-mix(in srgb, #86EFAC 25%, transparent);
  margin-top: 48px;
  color: #FFFFFF;
  font-family: Calibri;
}
main.xwalk-footer,
main.xwalk-footer-boost {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 32px 32px;
  box-sizing: border-box;
}
main.xwalk-footer-boost > div {
  width: 100%;
}
main.xwalk-footer-boost .xwalk-footer-top {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: start;
  gap: 24px 40px;
  padding: 32px 0 28px;
  border-bottom: 1px solid color-mix(in srgb, #86EFAC 20%, transparent);
}
main.xwalk-footer-boost .xwalk-footer-top-brand {
  max-width: 360px;
}
main.xwalk-footer-boost .xwalk-footer-top-brand .xwalk-footer-brand {
  margin: 0 0 8px;
}
main.xwalk-footer-boost .xwalk-footer-top-brand .xwalk-footer-brand img {
  display: block;
  height: 48px;
  width: auto;
  max-width: 200px;
  object-fit: contain;
}
main.xwalk-footer-boost .xwalk-footer-top-social {
  text-align: right;
}
main.xwalk-footer-boost .xwalk-footer-social-label {
  margin: 0 0 12px;
  font-size: 0.875rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: color-mix(in srgb, #FFFFFF 88%, transparent);
}
main.xwalk-footer-boost .xwalk-footer-social {
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-end;
  gap: 12px 20px;
  list-style: none;
  padding: 0;
  margin: 0;
}
main.xwalk-footer-boost .xwalk-footer-social a {
  color: #FFFFFF;
  font-weight: 600;
  font-size: 0.875rem;
  text-decoration: none;
}
main.xwalk-footer-boost .xwalk-footer-social a:hover {
  color: #86EFAC;
}
main.xwalk-footer-boost .xwalk-footer-columns {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 28px 24px;
  padding: 32px 0 28px;
}
main.xwalk-footer-boost .xwalk-footer-col p {
  margin: 0 0 12px;
  font-family: Arial Black;
  font-size: 0.8125rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
main.xwalk-footer-boost .xwalk-footer-col ul {
  list-style: none;
  padding: 0;
  margin: 0;
}
main.xwalk-footer-boost .xwalk-footer-col li {
  margin: 0 0 8px;
}
main.xwalk-footer-boost .xwalk-footer-col a {
  color: color-mix(in srgb, #FFFFFF 92%, transparent);
  font-size: 0.9375rem;
  text-decoration: none;
}
main.xwalk-footer-boost .xwalk-footer-col a:hover {
  color: #86EFAC;
}
main.xwalk-footer-boost .xwalk-footer-newsletter {
  padding: 28px 0 32px;
  border-top: 1px solid color-mix(in srgb, #86EFAC 18%, transparent);
  border-bottom: 1px solid color-mix(in srgb, #86EFAC 18%, transparent);
  text-align: center;
  max-width: 640px;
  margin: 0 auto;
}
main.xwalk-footer-boost .xwalk-footer-newsletter h2 {
  margin: 0 0 8px;
  font-family: Arial Black;
  font-size: 1.5rem;
  font-weight: 900;
  color: #FFFFFF;
  text-transform: none;
  letter-spacing: 0;
}
main.xwalk-footer-boost .xwalk-footer-newsletter > p {
  margin: 0 0 20px;
  color: color-mix(in srgb, #FFFFFF 85%, transparent);
  font-size: 1rem;
}
main.xwalk-footer-boost .xwalk-footer-newsletter-form {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
  gap: 12px;
  margin: 0;
}
main.xwalk-footer-boost .xwalk-footer-newsletter-form label {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  border: 0;
}
main.xwalk-footer-boost .xwalk-footer-newsletter-form input[type="email"] {
  min-width: min(320px, 100%);
  padding: 12px 16px;
  border: 1px solid color-mix(in srgb, #FFFFFF 35%, transparent);
  border-radius: 4px;
  background: #0A1A0F;
  color: #FFFFFF;
  font-size: 1rem;
}
main.xwalk-footer-boost .xwalk-footer-subscribe-btn {
  display: inline-block;
  padding: 12px 28px;
  background: #1DB954;
  color: #000 !important;
  font-weight: 800;
  text-decoration: none;
  border-radius: 4px;
  font-size: 0.9375rem;
}
main.xwalk-footer-boost .xwalk-footer-legal {
  padding: 24px 0 8px;
  text-align: center;
}
main.xwalk-footer-boost .xwalk-footer-legal > p {
  margin: 0 0 12px;
  font-size: 0.8125rem;
  color: color-mix(in srgb, #FFFFFF 75%, transparent);
}
main.xwalk-footer-boost .xwalk-footer-legal ul {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px 20px;
  list-style: none;
  padding: 0;
  margin: 0;
}
main.xwalk-footer-boost .xwalk-footer-legal a {
  color: color-mix(in srgb, #FFFFFF 88%, transparent);
  font-size: 0.8125rem;
  text-decoration: underline;
}
@media (max-width: 1000px) {
  main.xwalk-footer-boost .xwalk-footer-columns {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }
}
@media (max-width: 700px) {
  main.xwalk-footer-boost .xwalk-footer-top {
    grid-template-columns: 1fr;
    text-align: center;
  }
  main.xwalk-footer-boost .xwalk-footer-top-social {
    text-align: center;
  }
  main.xwalk-footer-boost .xwalk-footer-social {
    justify-content: center;
  }
  main.xwalk-footer-boost .xwalk-footer-columns {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

.xwalk-persona-experience-stack{display:block;width:100%}
