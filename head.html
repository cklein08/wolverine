.xwalk-email-offer-kicker{margin:0 0 6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#666}
.xwalk-email-offer-name{margin:0 0 8px;font-family:Arial Black;font-size:1rem;font-weight:800;color:#111}
.xwalk-email-offer-price{margin:0 0 12px;font-size:1.125rem;font-weight:800;color:#1DB954}
.xwalk-email-offer-cta{margin:0;margin-top:auto}
.xwalk-email-offer-cta a{display:inline-block;padding:10px 16px;background:#1DB954;color:#0a1a0f!important;font-weight:700;font-size:.8125rem;border-radius:4px;text-decoration:none}
.xwalk-persona-email-primary-cta{text-align:center;margin:0 0 8px}
.xwalk-persona-email-primary-cta a{display:inline-block;padding:14px 32px;background:#1DB954;color:#0a1a0f!important;font-weight:800;font-size:1rem;border-radius:4px;text-decoration:none}
@media(max-width:768px){.xwalk-persona-email-offers-grid{grid-template-columns:1fr}}
.xwalk-persona-white-band .xwalk-persona-quote-text{font-size:1.1rem;color:#0E7A3A;font-style:italic;margin:0 0 24px;max-width:900px}
.xwalk-persona-plan-row{display:grid;grid-template-columns:1fr minmax(160px,200px);gap:20px;max-width:1100px;align-items:stretch}
.xwalk-persona-white-band h2{font-family:Arial Black;color:#0E7A3A;font-size:1.5rem;margin:0 0 16px}
.xwalk-plan-lines{margin:0;padding:0;display:flex;flex-direction:column;gap:12px}
.xwalk-plan-line{display:grid;grid-template-columns:72px 96px 1fr;gap:10px;align-items:center}
.xwalk-plan-line-label{font-weight:700;color:#333}
.xwalk-plan-line-price{font-weight:800;color:#0E7A3A}
.xwalk-plan-discount{display:block;font-size:.72rem;font-style:normal;color:#1DB954}
.xwalk-plan-line-pill,.forge-plan-offer .xwalk-plan-line-pill{margin:0}
.xwalk-plan-line-pill--dark,.xwalk-plan-pill.xwalk-plan-line-pill--dark{background:#1a1a1a!important;color:#fff!important;border-radius:6px;padding:10px 14px;font-size:.78rem;line-height:1.35;display:block}
.xwalk-plan-line-pill--accent{background:color-mix(in srgb,#1DB954 35%,#fff);color:#0E7A3A;border:1px solid color-mix(in srgb,#1DB954 50%,transparent);border-radius:6px;padding:10px 14px;font-size:.78rem;display:block;margin:0}
.xwalk-persona-plan-col .xwalk-plan-shop{display:none!important}
.xwalk-persona-cta-card{background:#1DB954;border-radius:12px;min-height:200px;display:flex}
.xwalk-persona-cta-card a{display:flex;align-items:center;justify-content:center;width:100%;color:#0a1a0f!important;font-weight:800;font-size:1.2rem;text-decoration:none}
.xwalk-persona-below-copy{margin-top:28px;padding-top:20px;border-top:1px solid #e5e5e5;max-width:900px}
.xwalk-persona-below-copy p{font-size:.85rem;color:#666;margin:0;line-height:1.5}
.xwalk-persona-plan--single .xwalk-plan-pill,.xwalk-persona-plan--student .xwalk-plan-pill{background:#1a1a1a;color:#fff;border-radius:6px;padding:10px 14px;display:inline-block;margin-bottom:16px}
@media(max-width:768px){.xwalk-persona-plan-row{grid-template-columns:1fr}.xwalk-plan-line{grid-template-columns:1fr;gap:4px}}
